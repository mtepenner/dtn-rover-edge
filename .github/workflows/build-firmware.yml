name: build-firmware

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rover-firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PlatformIO
        run: pip install platformio
      - name: Build ESP32 firmware
        run: pio run -d rover_firmware
